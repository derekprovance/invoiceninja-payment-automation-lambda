services:
  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ninja
      MYSQL_USER: ninja
      MYSQL_PASSWORD: ninja_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  invoiceninja:
    image: invoiceninja/invoiceninja:latest
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_URL: http://localhost:8000
      APP_KEY: base64:I4rEj0YHHjU8R5UIjdtfF7vN4+XMqO+aOxgq3Ewp32M=
      APP_ENV: local
      REQUIRE_HTTPS: "false"
      DB_HOST: db
      DB_DATABASE: ninja
      DB_USERNAME: ninja
      DB_PASSWORD: ninja_password
      REDIS_HOST: redis
      QUEUE_CONNECTION: sync
      MAIL_MAILER: log
      IN_USER_EMAIL: ${IN_USER_EMAIL:-admin@test.local}
      IN_PASSWORD: ${IN_PASSWORD:-TestPassword123}
    volumes:
      - invoiceninja_public:/var/www/app/public
      - invoiceninja_storage:/var/www/app/storage

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    depends_on:
      - invoiceninja
    volumes:
      - ./docker/nginx/in-vhost.conf:/etc/nginx/conf.d/default.conf:ro
      - invoiceninja_public:/var/www/app/public:ro

volumes:
  db_data:
  invoiceninja_public:
  invoiceninja_storage:
